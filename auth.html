<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Gestion Scolaire</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 style="color: #1e3a8a; margin-bottom: 10px;"> PSAbsences</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Connectez-vous à votre compte</p>
        </div>
        <div id="msg-retour" style="display:none;"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" placeholder="admin@ecole.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Se connecter</button>
            <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: #64748b;">
                Pas encore de compte ? <a href="inscription.html" style="color: #3b82f6; text-decoration: none; font-weight: 500;">S'inscrire</a>
            </div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
