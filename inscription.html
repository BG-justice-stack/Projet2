<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - PSAbsences</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2 style="color: #1e3a8a; margin-bottom: 10px;"> PSAbsences</h2>
            <p style="color: #64748b; font-size: 0.9rem;">Inscrivez-vous</p>
        </div>
        
        <div id="msg-retour" style="display:none;"></div>
        <form id="loginForm">
             <div class="form-group">
                        <label>Nom</label>
                        <input type="text" id="loginLastName" name="nom" required>
                    </div>
                    <div class="form-group">
                        <label>Prenom</label>
                        <input type="text" id="loginFirstName" name="prenom" required>
                    </div>
              

<p><small>Maintenez <strong>Ctrl</strong> (Windows) ou <strong>Commande</strong> (Mac) pour en sélectionner plusieurs.</small></p>
 

            <div class="form-group">
                <label for="email">Adresse Email</label>
                <input type="email" id="email" name="email" placeholder="admin@ecole.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">S'inscrire</button>
            <div style="text-align: center; margin-top: 20px; font-size: 0.85rem; color: #64748b;">
               deja un compte ? <a href="auth.html" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Se connecter</a>
            </div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
